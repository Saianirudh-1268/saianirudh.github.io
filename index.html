<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Sai Anirudh Portfolio</title>

<style>

/* =======================
   GLOBAL GLASSMORPHISM UI
======================= */

body{
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background: linear-gradient(135deg,#e0eafc,#cfdef3);
  overflow-x:hidden;
}

/* smooth animations */
*{
  transition: all 0.3s ease;
}

/* =======================
   GLASS CARD STYLE
======================= */

.card,
.resume-card,
.hero-container,
.info-card,
.cert-card,
.sidebar,
.topbar{
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

/* =======================
   TOP NAVBAR
======================= */

.top-buttons{
  position: fixed;
  top: 10px;
  left: 10px;
  display:flex;
  gap:10px;
  z-index:9999;
}

.menu-btn,
.about-tab{
  padding:10px 15px;
  border:none;
  cursor:pointer;
  border-radius:12px;
  font-weight:600;
  background: rgba(255,255,255,0.4);
}

.about-tab:hover{
  transform: translateY(-3px);
  background:#2563eb;
  color:white;
}

/* =======================
   SIDEBAR (MOBILE MENU)
======================= */

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  padding-top:80px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:9999;
  transition:0.4s;
}

.sidebar.active{
  left:0;
}

.sidebar button{
  margin:8px;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  background:rgba(255,255,255,0.5);
}

.sidebar button:hover{
  background:#2563eb;
  color:white;
  transform:translateX(5px);
}

/* =======================
   MAIN CONTENT
======================= */

.main{
  padding:100px 40px;
  transition:0.4s;
}

.main.slide{
  margin-left:260px;
}

/* =======================
   HERO SECTION
======================= */

.hero-container{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  gap:30px;
  padding:30px;
}

.profile-photo{
  width:200px;
  height:200px;
  border-radius:50%;
  border:4px solid #2563eb;
}

.hero-right h1{
  font-size:38px;
  color:#1e3a8a;
}

.hero-buttons a{
  display:inline-block;
  padding:12px 20px;
  margin:10px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

/* =======================
   BUTTONS
======================= */

.github-btn{border:2px solid #2563eb;color:#2563eb;}
.linkedin-btn{background:#2563eb;color:white;}
.coffee-btn{background:#ffdd00;color:black;}
.inspiration-btn{background:#4f46e5;color:white;}

/* hover animation */
.hero-buttons a:hover{
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* =======================
   INFO CARDS
======================= */

.card-grid{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.info-card{
  width:280px;
  padding:15px;
  text-align:center;
}

.info-card img{
  width:100%;
  border-radius:12px;
}

/* =======================
   ANIMATIONS
======================= */

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.card, .hero-container{
  animation:fadeUp 0.6s ease;
}

/* =======================
   MOBILE RESPONSIVE
======================= */

@media(max-width:768px){

  .main.slide{
    margin-left:0;
  }

  .hero-right h1{
    font-size:28px;
    text-align:center;
  }

  .hero-buttons{
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .info-card{
    width:90%;
  }

  .top-buttons{
    flex-wrap:wrap;
  }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-buttons">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <button class="about-tab" onclick="openTab('about')">Home</button>
  <button class="about-tab" onclick="openTab('resume')">Resume</button>
  <button class="about-tab" onclick="openTab('projects')">Projects</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button onclick="openTab('projects')">Projects</button>
  <button onclick="openTab('presentations')">Presentations</button>
  <button onclick="openTab('research')">Research</button>
  <button onclick="openTab('contact')">Contact</button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<!-- HOME -->
<div class="card active" id="about">

  <div class="hero-container">

    <img src="Images/profile.jpeg" class="profile-photo">

    <div class="hero-right">
      <h1>Sai Anirudh</h1>
      <h3>Embedded | VLSI | RF | Software Testing</h3>

      <div class="hero-buttons">

        <a class="github-btn" href="#">GitHub</a>
        <a class="linkedin-btn" href="#">LinkedIn</a>
        <a class="coffee-btn" href="#">☕ Coffee</a>
        <a class="inspiration-btn" href="#">🌟 Inspiration</a>

      </div>
    </div>

  </div>

</div>

<!-- RESUME -->
<div class="card" id="resume">
  <h2>Resume Section</h2>
</div>

<!-- PROJECTS -->
<div class="card" id="projects">
  <h2>Projects</h2>
</div>

<!-- CONTACT -->
<div class="card" id="contact">
  <h2>Contact</h2>
</div>

</div>

<script>

/* ======================
   SIDEBAR TOGGLE
====================== */

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("main").classList.toggle("slide");
}

/* ======================
   TAB SWITCH
====================== */

function openTab(id){

  let cards = document.querySelectorAll(".card");

  cards.forEach(c => c.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("main").classList.remove("slide");
}

</script>

</body>
</html>
